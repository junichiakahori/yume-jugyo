<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夢授業 インタラクティブ・スライド</title>
  <!-- Google Fonts: インターネット接続時に読み込み。オフライン時はシステムフォントにフォールバック -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-cyber">
  <!-- アプリケーションコンテナ -->
  <div id="app-container" class="layout-viewer">
    
    <!-- トップナビゲーションバー（編集時・通常時のみ表示。フルスクリーン時は非表示） -->
    <header id="top-navbar" class="top-navbar">
      <div class="nav-left">
        <span class="app-logo">
          <svg viewBox="0 0 24 24" width="24" height="24" class="logo-icon">
            <path fill="currentColor" d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12C20,14.09 19.2,15.97 17.9,17.4L16.47,15.97C17.43,14.89 18,13.5 18,12A6,6 0 0,0 12,6V4M12,8A4,4 0 0,1 16,12C16,13 15.6,13.9 15,14.58L13.59,13.17C13.85,12.87 14,12.45 14,12A2,2 0 0,0 12,10V8M12,12A2,2 0 0,1 10,14V16A4,4 0 0,0 14,12H12M12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6V8A4,4 0 0,0 8,12A4,4 0 0,0 12,16V18M12,20V22A10,10 0 0,0 22,12H20A8,8 0 0,1 12,20Z"/>
          </svg>
          夢授業スライド
        </span>
        <select id="deck-selector" class="deck-selector">
          <!-- スライドデッキの選択肢がJSから挿入されます -->
        </select>
      </div>
      <div class="nav-right">
        <button id="btn-toggle-edit" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M14.06,9L15,9.94L5.92,19H5V18.08L14.06,9M17.66,3C17.41,3 17.15,3.1 16.96,3.29L15.13,5.12L18.88,8.87L20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18.17,3.09 17.92,3 17.66,3M14.06,6.19L3,17.25V21H6.75L17.81,9.94L14.06,6.19Z"/></svg>
          <span>編集モード</span>
        </button>
        <button id="btn-play-fullscreen" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M5,5H10V7H7V10H5V5M14,5H19V10H17V7H14V5M17,14H19V19H14V17H17V14M10,17V19H5V14H7V17H10Z"/></svg>
          <span>全画面発表</span>
        </button>
      </div>
    </header>

    <!-- メインワークスペース（スライドプレイヤーとエディタサイドバー） -->
    <main class="main-workspace">
      
      <!-- スライドプレイヤーエリア -->
      <section id="slide-player" class="slide-player">
        <div id="slide-container" class="slide-container">
          <!-- 現在のスライド内容がここにJSで挿入されます -->
        </div>

        <!-- 手書きキャンバス & レザーポインター用レイヤー -->
        <canvas id="drawing-canvas"></canvas>
        <div id="laser-pointer" class="laser-pointer"></div>

        <!-- 左右移動矢印ボタン (PCホバー時/モバイル用) -->
        <button id="btn-slide-prev" class="nav-arrow nav-arrow-left" aria-label="前のスライドへ">
          <svg viewBox="0 0 24 24" width="36" height="36"><path fill="currentColor" d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z"/></svg>
        </button>
        <button id="btn-slide-next" class="nav-arrow nav-arrow-right" aria-label="次のスライドへ">
          <svg viewBox="0 0 24 24" width="36" height="36"><path fill="currentColor" d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
        </button>
      </section>

      <!-- エディタサイドバー（編集モード時に表示） -->
      <aside id="editor-sidebar" class="editor-sidebar">
        <div class="sidebar-header">
          <h3>スライド編集パネル</h3>
          <button id="btn-close-editor" class="btn-icon" aria-label="エディタを閉じる">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
          </button>
        </div>

        <div class="sidebar-tabs">
          <button id="tab-slides" class="tab-btn active">スライド一覧</button>
          <button id="tab-content" class="tab-btn">スライド内容</button>
          <button id="tab-settings" class="tab-btn">保存/入出力</button>
        </div>

        <div class="sidebar-scroll-content">
          <!-- タブ1: スライド一覧・追加削除 -->
          <div id="panel-slides" class="editor-panel active">
            <div class="deck-meta-edit">
              <label for="edit-deck-title">プレゼンテーションのタイトル:</label>
              <input type="text" id="edit-deck-title" class="form-control">
            </div>
            <div class="slide-list-controls">
              <button id="btn-add-slide" class="btn btn-sm btn-secondary">＋ スライド追加</button>
            </div>
            <ul id="slide-thumbnail-list" class="slide-thumbnail-list">
              <!-- スライドのサムネイル（リスト）が挿入されます -->
            </ul>
          </div>

          <!-- タブ2: 選択中のスライド内容編集 -->
          <div id="panel-content" class="editor-panel">
            <div id="editor-form-container">
              <div class="form-group">
                <label for="edit-slide-layout">レイアウト:</label>
                <select id="edit-slide-layout" class="form-control">
                  <option value="title">タイトルスライド</option>
                  <option value="list">箇条書きスライド</option>
                  <option value="split">左右2分割スライド</option>
                  <option value="timeline">タイムライン（キャリアの歩み）</option>
                  <option value="quote">名言・メッセージ</option>
                  <option value="kamishibai">紙芝居（イラスト＋ストーリー）</option>
                </select>
              </div>

              <div class="form-group">
                <label for="edit-slide-title">スライドタイトル:</label>
                <input type="text" id="edit-slide-title" class="form-control">
              </div>

              <div class="form-group">
                <label for="edit-slide-subtitle">サブタイトル:</label>
                <input type="text" id="edit-slide-subtitle" class="form-control">
              </div>

              <!-- 動的フォームエリア：レイアウトごとに切り替わる -->
              <div id="dynamic-fields-container">
                <!-- JSで各レイアウト用の入力項目が生成されます -->
              </div>

              <div class="form-group">
                <label for="edit-slide-notes">発表者ノート（メモ）:</label>
                <textarea id="edit-slide-notes" class="form-control text-area-notes" rows="4" placeholder="発表時にカンペとして表示されるメモです..."></textarea>
              </div>
            </div>
          </div>

          <!-- タブ3: 保存とエクスポート/インポート -->
          <div id="panel-settings" class="editor-panel">
            <div class="settings-section">
              <h4>データの保存と復元</h4>
              <p class="settings-desc">編集内容はブラウザ（localStorage）に自動保存されます。</p>
              <div class="btn-stack">
                <button id="btn-save-local" class="btn btn-secondary">ブラウザに明示的に保存</button>
                <button id="btn-reset-preset" class="btn btn-danger">初期プリセットに戻す</button>
              </div>
            </div>

            <div class="settings-section">
              <h4>外部ファイルとの入出力</h4>
              <p class="settings-desc">作成したスライドデータをJSONファイルとしてエクスポート・インポートできます。</p>
              <div class="btn-stack">
                <button id="btn-export-json" class="btn btn-secondary">JSONとして書き出し</button>
                <div class="file-input-wrapper">
                  <button class="btn btn-secondary btn-file-dummy">JSONの読み込み</button>
                  <input type="file" id="file-import-json" accept=".json">
                </div>
              </div>
            </div>

            <div class="settings-section">
              <h4>オフライン配布用HTMLの作成</h4>
              <p class="settings-desc">現在表示・編集しているスライドデータを埋め込み、ネットのない場所でもダブルクリックするだけで使える「自己完結型HTMLファイル」を生成しダウンロードします。</p>
              <button id="btn-export-standalone" class="btn btn-primary">オフライン用HTMLのダウンロード</button>
            </div>
          </div>
        </div>
      </aside>
    </main>

    <!-- プレゼンター用フローティング・コントロールバー（画面下部にフロート） -->
    <div id="presenter-control-bar" class="presenter-control-bar">
      <!-- ページナビゲーション -->
      <div class="control-group nav-controls">
        <button id="btn-ctrl-first" class="btn-control" title="最初のスライドへ">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18.41,16.59L13.82,12L18.41,7.41L17,6L11,12L17,18L18.41,16.59M6,6H8V18H6V6Z"/></svg>
        </button>
        <button id="btn-ctrl-prev" class="btn-control" title="前のスライドへ">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z"/></svg>
        </button>
        <span id="slide-counter" class="slide-counter">0 / 0</span>
        <button id="btn-ctrl-next" class="btn-control" title="次のスライドへ">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
        </button>
        <button id="btn-ctrl-last" class="btn-control" title="最後のスライドへ">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M5.59,7.41L10.18,12L5.59,16.59L7,18L13,12L7,6L5.59,7.41M16,6H18V18H16V6Z"/></svg>
        </button>
      </div>

      <div class="divider"></div>

      <!-- タイマーコントロール (15分交代用) -->
      <div class="control-group timer-controls">
        <span class="control-icon" title="交代用タイマー">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22C6.47,22 2,17.5 2,12A10,10 0 0,1 12,2M12.5,7V12.25L17,14.92L16.25,16.15L11,13V7H12.5Z"/></svg>
        </span>
        <div class="timer-display-container">
          <span id="timer-text" class="timer-text">15:00</span>
          <div class="timer-progress-bar"><div id="timer-progress" class="timer-progress"></div></div>
        </div>
        <button id="btn-timer-toggle" class="btn-control" title="再生・一時停止">
          <svg id="timer-toggle-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
        </button>
        <button id="btn-timer-reset" class="btn-control" title="タイマーリセット">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12,5V1L7,6L12,11V7A6,6 0 0,1 18,13A6,6 0 0,1 12,19A6,6 0 0,1 6,13H4A8,8 0 0,0 12,21A8,8 0 0,0 20,13A8,8 0 0,0 12,5Z"/></svg>
        </button>
        <!-- 時間調整・デバッグ用 -->
        <select id="timer-preset-selector" class="timer-preset-selector" title="制限時間設定">
          <option value="900">15分 (授業)</option>
          <option value="600">10分</option>
          <option value="300">5分</option>
          <option value="60">1分</option>
          <option value="10">10秒 (テスト)</option>
        </select>
      </div>

      <div class="divider"></div>

      <!-- ペン & レーザーポインターツール -->
      <div class="control-group tool-controls">
        <button id="btn-tool-laser" class="btn-control" title="レーザーポインター">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12S6.48 22 12 22 22 17.52 22 12 17.52 2 12 2M12 20C7.58 20 4 16.42 4 12S7.58 4 12 4 20 7.58 20 12 16.42 20 12 20M12 11C11.45 11 11 11.45 11 12S11.45 13 12 13 13 12.55 13 12 12.55 11 12 11M12 7C9.24 7 7 9.24 7 12S9.24 17 12 17 17 14.76 17 12 14.76 7 12 7Z"/></svg>
        </button>
        <button id="btn-tool-pen" class="btn-control" title="手書きペン">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.94L14.06,6.19L3,17.25Z"/></svg>
        </button>
        <!-- ペンの色選択 (ペン有効時のみ) -->
        <div id="pen-color-selector" class="pen-color-selector hidden">
          <button class="color-dot color-red active" data-color="#ff3b30" title="赤ペン"></button>
          <button class="color-dot color-blue" data-color="#007aff" title="青ペン"></button>
          <button class="color-dot color-green" data-color="#34c759" title="緑ペン"></button>
          <button class="color-dot color-yellow" data-color="#ffcc00" title="黄ペン"></button>
        </div>
        <button id="btn-tool-clear" class="btn-control hidden" title="手書きを消去">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19.36,2.72L20.78,4.14L15.06,9.85C16.13,11.39 16.28,13.24 15.38,14.44L9.06,8.12C10.26,7.22 12.11,7.37 13.65,8.44L19.36,2.72M5.93,17.57C3.97,15.62 3.97,12.45 5.93,10.5L9.06,13.62L5.93,17.57M18.5,18.5C18.5,19.88 15.37,21 11.5,21C7.63,21 4.5,19.88 4.5,18.5V17.5H18.5V18.5Z"/></svg>
        </button>
      </div>

      <div class="divider"></div>

      <!-- デザイン＆レイアウト調整 -->
      <div class="control-group appearance-controls">
        <span class="control-icon" title="テーマ変更">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12C20,13.3 19.47,14.47 18.61,15.32L16.47,13.17C17.38,12.19 17.36,10.66 16.42,9.7C15.47,8.75 13.94,8.73 12.96,9.65L10.82,7.5C11.19,7.18 11.57,6.91 12,6.7V4M12,8A4,4 0 0,0 8,12C8,12.43 8.07,12.85 8.2,13.24L6.44,15C5.53,14.15 5,12.94 5,11.6V8A6,6 0 0,1 11,2H12A8,8 0 0,1 12,8Z"/></svg>
        </span>
        <select id="theme-selector" class="theme-selector">
          <option value="theme-ocean">Kitakyushu Ocean (青・海)</option>
          <option value="theme-cafe">Warm Cafe (茶・温かみ)</option>
          <option value="theme-cyber">Future Cyber (黒・テック)</option>
          <option value="theme-sakura">Sakura Pink (桜・華やか)</option>
        </select>
        <button id="btn-toggle-notes" class="btn-control" title="スピーカーノートを表示">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M9,22A1,1 0 0,1 8,21V18H4A2,2 0 0,1 2,16V4C2,2.89 2.9,2 4,2H20A2,2 0 0,1 22,4V16A2,2 0 0,1 20,18H13.9L10.3,21.6C10.1,21.8 9.8,22 9,22M10,16H18V14H10V16M10,12H18V10H10V12M10,8H18V6H10V8M4,6V16H8V18.1L10.1,16H20V4H4V6Z"/></svg>
        </button>
        <button id="btn-ctrl-fullscreen" class="btn-control" title="全画面の切り替え">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M5,5H10V7H7V10H5V5M14,5H19V10H17V7H14V5M17,14H19V19H14V17H17V14M10,17V19H5V14H7V17H10Z"/></svg>
        </button>
      </div>
    </div>

    <!-- スピーカーノートエリア (下部にスライド展開される drawer) -->
    <div id="presenter-notes-drawer" class="presenter-notes-drawer">
      <div class="notes-header">
        <h4>🗣️ スピーカーノート (発表用メモ)</h4>
        <button id="btn-close-notes" class="btn-icon">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
        </button>
      </div>
      <div id="notes-content" class="notes-content">
        <!-- スピーカーノートがここに挿入されます -->
      </div>
    </div>

    <!-- チャイム通知 (画面中央に表示される警告) -->
    <div id="alarm-toast" class="alarm-toast hidden">
      <div class="toast-icon">⏰</div>
      <div class="toast-body">
        <h4>15分セッション終了！</h4>
        <p>次のグループへ交代してください。</p>
      </div>
    </div>

  </div>

  <!-- スクリプトのインポート -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
